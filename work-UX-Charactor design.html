  <script>
    /* Scroll reveal */
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) entry.target.classList.add('is-visible');
        else entry.target.classList.remove('is-visible');
      });
    }, { threshold: 0.12 });
    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

    /* Dark mode */
    const toggle = document.getElementById('theme-toggle');
    if (localStorage.getItem('theme') === 'dark') {
      document.body.classList.add('dark');
      toggle.textContent = 'Light';
    }
    toggle.addEventListener('click', () => {
      const isDark = document.body.classList.toggle('dark');
      toggle.textContent = isDark ? 'Light' : 'Dark';
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });

    /* Custom cursor */
    const cursor = document.getElementById('cursor');
    let mx = -100, my = -100, cx = -100, cy = -100;
    document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
    document.addEventListener('mousedown', () => cursor.classList.add('clicking'));
    document.addEventListener('mouseup', () => cursor.classList.remove('clicking'));
    function lerp(a, b, t) { return a + (b - a) * t; }
    function animateCursor() {
      cx = lerp(cx, mx, 0.18);
      cy = lerp(cy, my, 0.18);
      cursor.style.left = cx + 'px';
      cursor.style.top = cy + 'px';
      requestAnimationFrame(animateCursor);
    }
    animateCursor();

    /* Hamburger */
    const hamburger = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobile-menu');
    hamburger.addEventListener('click', () => {
      hamburger.classList.toggle('open');
      mobileMenu.classList.toggle('open');
    });
    mobileMenu.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        hamburger.classList.remove('open');
        mobileMenu.classList.remove('open');
      });
    });

    /* ════ ALL EYES — one script for every character ════ */
    const allEyes = document.querySelectorAll('.eye');
    document.addEventListener('mousemove', (e) => {
      allEyes.forEach((eye) => {
        const r = eye.getBoundingClientRect();
        const cx = r.left + r.width / 2;
        const cy = r.top + r.height / 2;
        const angle = Math.atan2(e.clientY - cy, e.clientX - cx);
        const dist = 12;
        eye.style.transform = `translate(${Math.cos(angle) * dist}px, ${Math.sin(angle) * dist}px)`;
      });
    });
  </script>






  <script>// ════ Generic hover-swap ════
function initHoverSwap(tileId, facesClass, interval = 400) {
  const tile = document.getElementById(tileId);
  if (!tile) return;
  const faces = tile.querySelectorAll('.' + facesClass);
  let index = 0;
  let timer = null;

  tile.addEventListener('mouseenter', () => {
    timer = setInterval(() => {
      faces[index].classList.remove('active');
      index = (index + 1) % faces.length;
      faces[index].classList.add('active');
    }, interval);
  });

  tile.addEventListener('mouseleave', () => {
    clearInterval(timer);
    faces[index].classList.remove('active');
    index = 0;
    faces[0].classList.add('active');
  });
}

initHoverSwap('buffon1-tile', 'buffon1-face');
initHoverSwap('buffon2-tile', 'buffon2-face');
initHoverSwap('zilla1-tile',  'zilla1-face');
initHoverSwap('zilla3-tile',  'zilla3-face');
initHoverSwap('pip2-tile',    'pip2-face');
initHoverSwap('pip3-tile',    'pip3-face');
initHoverSwap('rumi1-tile',   'rumi1-face');
initHoverSwap('rumi2-tile',   'rumi2-face');

// ════ Eye tracking ════
document.addEventListener('mousemove', (e) => {
  document.querySelectorAll('.eye').forEach((eye) => {
    const rect = eye.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const dx = e.clientX - cx;
    const dy = e.clientY - cy;
    const angle = Math.atan2(dy, dx);
    const dist = Math.min(Math.hypot(dx, dy) / 10, 6);
    const x = Math.cos(angle) * dist;
    const y = Math.sin(angle) * dist;
    eye.style.transform = `translate(${x}px, ${y}px)`;
  });
});</script>
